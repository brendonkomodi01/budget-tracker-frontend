<div class="container mt-4">
  <h2>Category list</h2>

  <table class="table table-striped">
    <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr *ngFor="let category of categories">
      <td>{{ category.id }}</td>
      <td>{{ category.name }}</td>
      <td>
        <button class="btn btn-danger btn-sm" (click)="deleteCategory(category.id)">Delete</button>
      </td>
    </tr>
    </tbody>
  </table>
</div>
