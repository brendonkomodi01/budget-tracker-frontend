<div class="container mt-4">
  <h2>Current balance</h2>
  <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
  <div class="card p-4" style="max-width: 400px;">
    <div class="mb-3">
      <label class="form-label">Current balance</label>
      <p class="fw-bold fs-4">{{ currentBalance | currency:'HUF':'symbol':'1.0-0' }} Ft</p>
    </div>
    <div class="mb-3">
      <label class="form-label">Set new balance</label>
      <input type="number" class="form-control" [(ngModel)]="newBalance" />
    </div>
    <button class="btn btn-success" (click)="save()">Save</button>
  </div>
</div>
