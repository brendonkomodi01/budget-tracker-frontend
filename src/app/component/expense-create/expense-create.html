<div class="container mt-4">
  <h2>Create new expense</h2>

  <div class="alert alert-success" *ngIf="successMessage">{{ successMessage }}</div>

  <form>
    <div class="mb-3">
      <label for="amount" class="form-label">Amount</label>
      <input
        type="number"
        id="amount"
        name="amount"
        class="form-control"
        [(ngModel)]="amount"
        placeholder="Amount">
      <div class="text-danger" *ngIf="fieldErrors.amount">{{ fieldErrors.amount }}</div>
    </div>

    <div class="mb-3">
      <label for="expenseDate" class="form-label">Expense date</label>
      <input
        type="date"
        id="expenseDate"
        name="expenseDate"
        class="form-control"
        [(ngModel)]="expenseDate"
        max="9999-12-31">
      <div class="text-danger" *ngIf="fieldErrors.expenseDate">{{ fieldErrors.expenseDate }}</div>
    </div>

    <div class="mb-3">
      <label for="categoryId" class="form-label">Category</label>
      <select
        id="categoryId"
        name="categoryId"
        class="form-select"
        [(ngModel)]="categoryId">
        <option [value]="null" disabled>Select a category</option>
        <option *ngFor="let category of categories" [value]="category.id">
          {{ category.name }}
        </option>
      </select>
      <div class="text-danger" *ngIf="fieldErrors.categoryId">{{ fieldErrors.categoryId }}</div>
    </div>

    <div class="mb-3">
      <label for="description" class="form-label">Description (optional)</label>
      <input
        type="text"
        id="description"
        name="description"
        class="form-control"
        [(ngModel)]="description"
        placeholder="Description">
    </div>

    <button type="button" class="btn btn-primary" (click)="onSubmit()">Save</button>
  </form>
</div>
